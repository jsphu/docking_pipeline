name: SaladCloud Docker Image CI

on:
  push:
    branches: ["md"]
  pull_request:
    branches: ["md"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: jsphu
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build md workflow testing pipeline
        run: |
          docker build . --tag ghcr.io/jsphu/md-workflow:test --file containers/md-workflow.dockerfile
          docker push ghcr.io/jsphu/md-workflow:test

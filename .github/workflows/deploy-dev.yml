name: SaladCloud Docker Image CI

on:
  push:
    branches: ["md"]
  pull_request:
    branches: ["md"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: jsphu
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build md workflow pipeline
        run: |
          cd ${{ github.workspace }}/containers
          docker build . --file "md-workflow.dockerfile" --tag jsphu/md-workflow:salad
